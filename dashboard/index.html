<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brad V2 — Bid Aggregator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1d29,#252a3a);padding:20px;border-bottom:1px solid #30363d;position:sticky;top:0;z-index:100}
.header h1{font-size:1.5rem;color:#58a6ff;margin-bottom:4px}
.header .stats{font-size:.85rem;color:#8b949e}
.controls{padding:12px 20px;background:#161b22;border-bottom:1px solid #21262d;display:flex;flex-wrap:wrap;gap:8px;align-items:center;position:sticky;top:70px;z-index:99}
.controls select,.controls input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:6px 10px;border-radius:6px;font-size:.85rem}
.controls input[type=text]{flex:1;min-width:200px}
.controls label{font-size:.8rem;color:#8b949e}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;padding:20px;max-width:1400px;margin:0 auto}
.card{background:#161b22;border:2px solid #30363d;border-radius:12px;padding:16px;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.card.urgent{border-color:#f85149}
.card.soon{border-color:#d29922}
.card.plenty{border-color:#3fb950}
.card.expired{border-color:#484f58;opacity:.6}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.card-title{font-size:1rem;font-weight:600;color:#f0f3f6;line-height:1.3}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:600;text-transform:uppercase;white-space:nowrap}
.badge-source{background:#1f3d5a;color:#58a6ff}
.badge-score{background:#1a3a1a;color:#3fb950}
.badge-score.mid{background:#3d2e00;color:#d29922}
.badge-score.low{background:#3d1a1a;color:#f85149}
.card-agency{font-size:.85rem;color:#8b949e;margin-bottom:6px}
.card-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:.8rem}
.card-meta span{display:flex;align-items:center;gap:3px}
.card-desc{font-size:.85rem;color:#b1bac4;line-height:1.5;margin-bottom:10px;max-height:120px;overflow:hidden;position:relative}
.card-desc.expanded{max-height:none}
.card-desc-toggle{color:#58a6ff;cursor:pointer;font-size:.8rem;margin-bottom:8px}
.card-contact{font-size:.8rem;color:#8b949e;border-top:1px solid #21262d;padding-top:8px;margin-top:8px}
.card-contact a{color:#58a6ff;text-decoration:none}
.card-footer{display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:#484f58;margin-top:8px}
.card-footer a{color:#58a6ff;text-decoration:none;font-weight:500}
.empty{text-align:center;padding:60px 20px;color:#484f58;font-size:1.2rem}
@media(max-width:500px){
  .grid{grid-template-columns:1fr;padding:10px}
  .controls{flex-direction:column}
  .controls input[type=text]{min-width:auto;width:100%}
}
</style>
</head>
<body>
<div class="header">
  <h1>🏗️ Brad V2 — Bid Aggregator</h1>
  <div class="stats">
    <span id="totalBids">Loading...</span> · 
    <span id="lastUpdated">—</span> · 
    Fort White, FL · 300mi radius
  </div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="🔍 Search bids...">
  <select id="filterDistance">
    <option value="999">All Distances</option>
    <option value="50">≤ 50 mi</option>
    <option value="100">≤ 100 mi</option>
    <option value="200">≤ 200 mi</option>
    <option value="300">≤ 300 mi</option>
  </select>
  <select id="filterSource">
    <option value="">All Sources</option>
  </select>
  <select id="sortBy">
    <option value="relevance">Highest Relevance</option>
    <option value="newest">Newest First</option>
    <option value="closest">Closest First</option>
    <option value="dueSoonest">Due Soonest</option>
    <option value="highestValue">Highest Value</option>
  </select>
  <select id="filterStatus">
    <option value="active">Active Only</option>
    <option value="all">All Bids</option>
    <option value="expired">Expired Only</option>
  </select>
</div>

<div id="grid" class="grid"></div>
<div id="empty" class="empty" style="display:none">No bids match your filters</div>

<script>
let allBids = [];
const now = new Date();

async function loadData() {
  try {
    const r = await fetch('data/bids.json');
    const data = await r.json();
    allBids = data.bids || [];
    document.getElementById('totalBids').textContent = `${allBids.length} bids`;
    document.getElementById('lastUpdated').textContent = `Updated: ${new Date(data.updated).toLocaleString()}`;
    
    // Populate source filter
    const sources = [...new Set(allBids.map(b => b.source).filter(Boolean))];
    const sel = document.getElementById('filterSource');
    sources.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s.replace(/_/g, ' ').toUpperCase();
      sel.appendChild(opt);
    });
    
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty">Failed to load bid data</div>';
  }
}

function getDueClass(due) {
  if (!due) return '';
  const d = new Date(due);
  if (isNaN(d)) return '';
  const days = (d - now) / 86400000;
  if (days < 0) return 'expired';
  if (days <= 7) return 'urgent';
  if (days <= 14) return 'soon';
  return 'plenty';
}

function formatDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}); }
  catch { return d.slice(0,10); }
}

function formatValue(v) {
  if (!v) return '';
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  if (n >= 1e6) return `$${(n/1e6).toFixed(1)}M`;
  if (n >= 1e3) return `$${(n/1e3).toFixed(0)}K`;
  return `$${n.toLocaleString()}`;
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const maxDist = parseInt(document.getElementById('filterDistance').value);
  const source = document.getElementById('filterSource').value;
  const sort = document.getElementById('sortBy').value;
  const status = document.getElementById('filterStatus').value;
  
  let filtered = allBids.filter(b => {
    if (search && !(b.title||'').toLowerCase().includes(search) && !(b.description||'').toLowerCase().includes(search) && !(b.agency||'').toLowerCase().includes(search)) return false;
    if (source && b.source !== source) return false;
    if (b.distance_miles && b.distance_miles > maxDist) return false;
    
    const dueClass = getDueClass(b.due_date);
    if (status === 'active' && dueClass === 'expired') return false;
    if (status === 'expired' && dueClass !== 'expired' && dueClass !== '') return false;
    
    return true;
  });
  
  filtered.sort((a, b) => {
    if (sort === 'relevance') return (b.relevance_score||0) - (a.relevance_score||0);
    if (sort === 'newest') return new Date(b.posted_date||0) - new Date(a.posted_date||0);
    if (sort === 'closest') return (a.distance_miles||999) - (b.distance_miles||999);
    if (sort === 'dueSoonest') {
      const da = a.due_date ? new Date(a.due_date) : new Date('2099-01-01');
      const db = b.due_date ? new Date(b.due_date) : new Date('2099-01-01');
      return da - db;
    }
    if (sort === 'highestValue') return (b.estimated_value||0) - (a.estimated_value||0);
    return 0;
  });
  
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  
  if (!filtered.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  grid.innerHTML = filtered.map((b, i) => {
    const dueClass = getDueClass(b.due_date);
    const scoreClass = (b.relevance_score||0) >= 50 ? '' : (b.relevance_score||0) >= 25 ? 'mid' : 'low';
    const desc = (b.description||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const dist = b.distance_miles ? `📍 ${Math.round(b.distance_miles)} mi` : '';
    const value = formatValue(b.estimated_value);
    
    let contact = '';
    const parts = [];
    if (b.contact_name) parts.push(b.contact_name);
    if (b.contact_email) parts.push(`<a href="mailto:${b.contact_email}">${b.contact_email}</a>`);
    if (b.contact_phone) parts.push(b.contact_phone);
    if (parts.length) contact = `<div class="card-contact">${parts.join(' · ')}</div>`;
    
    return `<div class="card ${dueClass}">
      <div class="card-header">
        <span class="card-title">${(b.title||'Untitled').replace(/</g,'&lt;')}</span>
        <span class="badge badge-score ${scoreClass}">${b.relevance_score||0}</span>
      </div>
      <div class="card-agency">${(b.agency||'').replace(/</g,'&lt;')}</div>
      <div class="card-meta">
        <span class="badge badge-source">${(b.source||'').replace(/_/g,' ')}</span>
        ${dist ? `<span>${dist}</span>` : ''}
        ${b.due_date ? `<span>📅 Due: ${formatDate(b.due_date)}</span>` : ''}
        ${value ? `<span>💰 ${value}</span>` : ''}
        ${b.naics_codes ? `<span>🏷️ ${b.naics_codes}</span>` : ''}
      </div>
      ${desc ? `<div class="card-desc" id="desc-${i}">${desc}</div>
      ${desc.length > 200 ? `<div class="card-desc-toggle" onclick="document.getElementById('desc-${i}').classList.toggle('expanded');this.textContent=this.textContent==='Show more'?'Show less':'Show more'">Show more</div>` : ''}` : ''}
      ${contact}
      <div class="card-footer">
        <span>Posted: ${formatDate(b.posted_date)}</span>
        ${b.external_url ? `<a href="${b.external_url}" target="_blank" rel="noopener">View Original ↗</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filterDistance').addEventListener('change', render);
document.getElementById('filterSource').addEventListener('change', render);
document.getElementById('sortBy').addEventListener('change', render);
document.getElementById('filterStatus').addEventListener('change', render);

loadData();
</script>
</body>
</html>
